# This chart inherits from the bjw-s common library chart.
# See https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml for all options.


# -- Grafana connection configuration
grafana:
  # -- Grafana URL (should point to the main Grafana service)
  url: "http://grafana:3000"
  # -- Grafana ApiKey (if not using a secret)
  apiKey: ""
  # -- Secret containing the Grafana API key
  apiKeySecret:
    # -- Name of the secret containing the API key
    name: "mcp-grafana-secrets"
    # -- Key within the secret that contains the API key
    key: "GRAFANA_API_KEY"

controllers:
  main:
    enabled: true
    type: deployment
    containers:
      main:
        image:
          repository: ghcr.io/grafana-community/grafana-mcp
          tag: "0.9.0"
          pullPolicy: IfNotPresent
        env:
          GRAFANA_URL: "{{ .Values.grafana.url }}"
          # GRAFANA_API_KEY will be loaded from secret below
        envFrom:
          - secretRef:
              name: {{ .Values.grafana.apiKeySecret.name }}
        #
        # The secret {{ .Values.grafana.apiKeySecret.name }} should contain:
        #   {{ .Values.grafana.apiKeySecret.key }}: <api-key-for-grafana>
        #   MCP_AUTH_API_KEY: <api-key-for-mcp-auth-layer> (for future use if implemented)
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 500m

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

ingress:
  main:
    enabled: false
    className: ""
    hosts:
      - host: mcp-grafana.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
